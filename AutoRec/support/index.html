<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Open AutoRec Support</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      color-scheme: dark;
      --bg0: #090b13;
      --bg1: #141a2d;
      --card: rgba(18, 22, 36, 0.88);
      --border: rgba(149, 166, 255, 0.18);
      --text: #f5f7ff;
      --muted: #b8c0df;
      --accent0: #7691ff;
      --accent1: #7fd3ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(118, 145, 255, 0.22), transparent 32%),
        radial-gradient(circle at bottom, rgba(127, 211, 255, 0.14), transparent 30%),
        linear-gradient(180deg, var(--bg1), var(--bg0));
    }

    .card {
      width: min(100%, 520px);
      padding: 28px 24px;
      border-radius: 24px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(20px);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 6vw, 42px);
      line-height: 1;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
    }

    a.button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 50px;
      padding: 0 18px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 700;
    }

    .primary {
      color: #08101f;
      background: linear-gradient(135deg, var(--accent1), var(--accent0));
    }

    .secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Opening AutoRec…</h1>
    <p>This link will launch AutoRec and open the in-app support flow.</p>

    <div class="actions">
      <a class="button primary" id="open-app" href="autorec://settings/support?support=1&amp;source=website">Open AutoRec</a>
      <a class="button secondary" href="/AutoRec/">Back</a>
    </div>

    <div class="status" id="status">If nothing happens, tap “Open AutoRec”.</div>
  </main>

  <script>
    (function () {
      var deepLink = "autorec://settings/support?support=1&source=website";
      var status = document.getElementById("status");

      function launch() {
        if (status) {
          status.textContent = "Attempting to launch AutoRec…";
        }
        window.location.href = deepLink;
      }

      window.addEventListener("load", function () {
        setTimeout(launch, 120);
      });

      window.addEventListener("pagehide", function () {
        if (status) {
          status.textContent = "AutoRec should be opening.";
        }
      });
    }());
  </script>
</body>
</html>
